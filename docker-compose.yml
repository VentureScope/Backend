# Local dev: API + PostgreSQL + Redis + Testing
services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://venturescope:venturescope@postgres:5432/venturescope
      SECRET_KEY: change-me-in-production-use-openssl-rand-hex-32
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 1440
      DEBUG: "false"
      ENVIRONMENT: "development"
      CORS_ORIGINS: "*"
      FRONTEND_URL: "http://localhost:3000"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    # Run migrations before starting the API server
    command: >
      sh -c "
        echo 'Waiting for database to be ready...' &&
        sleep 5 &&
        echo 'Running database migrations...' &&
        ./scripts/run_migrations.sh &&
        echo 'Starting API server...' &&
        uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
      "

  # Test service for running tests in Docker
  test:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      TEST_DATABASE_URL: postgresql+asyncpg://venturescope:venturescope@postgres:5432/venturescope_test
      SECRET_KEY: test-secret-key-for-testing-only
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 1440
      DEBUG: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - .:/app
      - ./htmlcov:/app/htmlcov  # For coverage reports
    command: ./scripts/docker-run-tests.sh
    profiles:
      - testing

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: venturescope
      POSTGRES_PASSWORD: venturescope
      POSTGRES_DB: venturescope
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init-test-db.sh:/docker-entrypoint-initdb.d/init-test-db.sh
    # Add health check for better dependency management
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U venturescope -d venturescope"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  pgdata: {}
