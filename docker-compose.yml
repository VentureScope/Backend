# Local dev: PostgreSQL and Redis (for future Celery)
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: venturescope
      POSTGRES_PASSWORD: venturescope
      POSTGRES_DB: venturescope
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  pgdata: {}
