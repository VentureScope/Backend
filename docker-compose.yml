# Local dev: API + PostgreSQL + Redis + Testing
# Uses .env file for configuration - DO NOT hardcode secrets here!

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env  # Load all variables from .env file
    environment:
      # Override specific variables for Docker networking
      DATABASE_URL: postgresql+asyncpg://venturescope:venturescope@postgres:5432/venturescope
      # All other variables come from .env file
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      # Mount source code for development (optional)
      - ./app:/app/app
      - ./alembic:/app/alembic
      - ./alembic.ini:/app/alembic.ini
    # Run migrations before starting the API server
    command: >
      sh -c "
        echo 'Waiting for database to be ready...' &&
        sleep 5 &&
        echo 'Running database migrations...' &&
        ./scripts/run_migrations.sh &&
        echo 'Starting API server...' &&
        uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
      "

  # Test service for running tests in Docker
  test:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env  # Load base configuration
    environment:
      # Override for testing
      TEST_DATABASE_URL: postgresql+asyncpg://venturescope:venturescope@postgres:5432/venturescope_test
      DATABASE_URL: postgresql+asyncpg://venturescope:venturescope@postgres:5432/venturescope_test
      SECRET_KEY: test-secret-key-for-testing-only
      DEBUG: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - .:/app
      - ./htmlcov:/app/htmlcov  # For coverage reports
    command: ./scripts/docker-run-tests.sh
    profiles:
      - testing

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: venturescope
      POSTGRES_PASSWORD: venturescope
      POSTGRES_DB: venturescope
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init-test-db.sh:/docker-entrypoint-initdb.d/init-test-db.sh
    # Add health check for better dependency management
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U venturescope -d venturescope"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  pgdata: {}
