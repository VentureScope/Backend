# Local dev: API + PostgreSQL + Redis + Testing
services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://venturescope:venturescope@postgres:5432/venturescope
      SECRET_KEY: change-me-in-production-use-openssl-rand-hex-32
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 1440
      DEBUG: "false"
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis

  # Test service for running tests in Docker
  test:
    build:
      context: .
      dockerfile: Dockerfile.test
    environment:
      TEST_DATABASE_URL: postgresql+asyncpg://venturescope:venturescope@postgres:5432/venturescope_test
      SECRET_KEY: test-secret-key-for-testing-only
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 1440
      DEBUG: "true"
    depends_on:
      - postgres
      - redis
    volumes:
      - .:/app
      - ./htmlcov:/app/htmlcov  # For coverage reports
    profiles:
      - testing

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: venturescope
      POSTGRES_PASSWORD: venturescope
      POSTGRES_DB: venturescope
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  pgdata: {}
